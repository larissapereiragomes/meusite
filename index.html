<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #e3f2fd; /* Fundo azul claro */
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        .btn-download {
            background-color: #007bff; color: white; border: none;
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            border-radius: 50px; cursor: pointer; text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }
        .btn-download:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <a href="https://github.com" download class="btn-download">
        entre para ver minhas fotos 
    </a>

</body>
</html>
